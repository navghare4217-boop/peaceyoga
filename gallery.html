<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peace Yoga Academy Gallery</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f7f7f7;
}

h1{
    text-align:center;
    padding:30px 10px;
    color:#2c3e50;
}

.gallery{
    max-width:1300px;
    margin:auto;
    padding:20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.gallery img{
    width:100%;
    height:260px;
    object-fit:cover;
    border-radius:12px;
    cursor:pointer;
    transition:.3s;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.gallery img:hover{
    transform:scale(1.05);
}

.lightbox{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.9);
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.lightbox img{
    max-width:90%;
    max-height:90%;
    border-radius:10px;
}

.close{
    position:absolute;
    top:20px;
    right:30px;
    font-size:40px;
    color:#fff;
    cursor:pointer;
}
</style>

</head>
<body>

<h1>Peace Yoga Academy Gallery</h1>

<div class="gallery" id="gallery"></div>

<div class="lightbox" id="lightbox">
<span class="close">&times;</span>
<img id="lightboxImg">
</div>

<script>

const images = [

"images/1 (1).jpeg",
"images/1 (2).jpeg",
"images/1 (3).jpeg",
"images/1 (4).jpeg",
"images/1 (5).jpeg",
"images/1 (6).jpeg",
"images/1 (7).jpeg",
"images/1 (9).jpeg",
"images/1 (10).jpeg",
"images/1 (11).jpeg",
"images/1 (12).jpeg",
"images/1 (13).jpeg",
"images/1 (14).jpeg",
"images/1 (15).jpeg",
"images/1 (16).jpeg",
"images/1 (17).jpeg",
"images/1 (18).jpeg",
"images/1 (19).jpeg",
"images/1 (20).jpeg",
"images/1 (21).jpeg",
"images/1 (22).jpeg",
"images/1 (23).jpeg",
"images/1 (25).jpeg",
"images/1 (26).jpeg",
"images/1 (27).jpeg",
"images/222.jpeg",
"images/home.jpeg",
"images/Prof. shushila maam.png"

];

const gallery=document.getElementById("gallery");
const lightbox=document.getElementById("lightbox");
const lightboxImg=document.getElementById("lightboxImg");

images.forEach(src=>{

let img=document.createElement("img");

img.src=src;

img.loading="lazy";

img.onclick=()=>{

lightbox.style.display="flex";

lightboxImg.src=src;

}

gallery.appendChild(img);

});

document.querySelector(".close").onclick=()=>{

lightbox.style.display="none";

}

lightbox.onclick=(e)=>{

if(e.target===lightbox){

lightbox.style.display="none";

}

}

</script>

</body>
</html>
